services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /app/db_vol/data.db
    volumes:
      - db_data:/app/db_vol
      - uploads_data:/app/uploads
    expose:
      - "3000"
    depends_on: []

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - app

volumes:
  db_data:
  uploads_data:
  certbot_www:
  certbot_conf:
